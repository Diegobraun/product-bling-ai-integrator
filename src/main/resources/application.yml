spring:
  application:
    name: catalog-bling-ia-integration

  config:
    import: "optional:file:./application-local.yml"

  datasource:
    url: jdbc:h2:file:./dados/catalogo;AUTO_SERVER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

ia:
  provider: ${IA_PROVIDER:gemini}
  pesquisa-provider: ${IA_PESQUISA_PROVIDER:gemini}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:coloque-sua-chave}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}

gemini:
  api-key: ${GEMINI_API_KEY:coloque-sua-chave}
  model: ${GEMINI_MODEL:gemini-3.5-flash}
  fallback-models: ${GEMINI_FALLBACK_MODELS:gemini-3.1-flash-lite,gemini-2.5-flash-lite,gemini-flash-lite-latest,gemini-3-flash-preview,gemini-2.5-flash}
  verificacao-models: ${GEMINI_VERIFICACAO_MODELS:gemini-3.1-flash-lite,gemini-2.5-flash-lite,gemini-flash-lite-latest}
#  fallback-models: ${GEMINI_FALLBACK_MODELS:gemini-3-flash-preview,gemini-2.5-flash}
#  verificacao-models: ${GEMINI_VERIFICACAO_MODELS:gemini-3.1-flash-lite,gemini-2.5-flash-lite,gemini-flash-lite-latest}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3}

bling:
  client-id: ${BLING_CLIENT_ID:seu-client-id}
  client-secret: ${BLING_CLIENT_SECRET:seu-client-secret}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
  storage-dir: ${APP_STORAGE_DIR:./dados/imagens}
