<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="bloco" id="bloco-imagem">
    <div th:if="${!#lists.isEmpty(p.imagens)}" class="galeria">
        <div th:each="img : ${p.imagens}" class="galeria-item">
            <img class="img-preview img-thumb" th:src="${img.urlPublica}" alt="Imagem do produto">
            <p class="muted" style="margin:6px 0 0">
                <span th:text="${img.kb} + ' KB'">200 KB</span> · 1024×1024
                <span th:if="${img.aprovada}" class="pill pill-ok">ok</span>
                <span th:unless="${img.aprovada}" class="pill pill-warn">revisar</span>
            </p>
            <button type="button" class="btn btn-sm"
                    th:attr="hx-post='/produtos/' + ${p.id} + '/imagem/' + ${img.id} + '/remover'"
                    hx-target="#bloco-imagem" hx-swap="outerHTML">Remover</button>
        </div>
    </div>
    <p th:unless="${!#lists.isEmpty(p.imagens)}" class="muted">Nenhuma imagem processada ainda.</p>

    <form th:attr="hx-post='/produtos/' + ${p.id} + '/imagem'"
          hx-target="#bloco-imagem" hx-swap="outerHTML"
          hx-encoding="multipart/form-data" style="margin-top:12px">
        <label>Adicionar imagens (pode selecionar várias)</label>
        <input type="file" name="imagens" accept="image/*" multiple required>
        <div class="acoes">
            <button type="submit" class="btn">Processar (1024², fundo branco, ≤200KB)</button>
            <span class="htmx-indicator spinner">processando…</span>
        </div>
    </form>
</div>
</body>
</html>
