<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Catálogo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>
<body>
<header th:fragment="topbar(blingConectado)" class="topbar">
    <a href="/produtos" class="marca">Catálogo · Bling + IA</a>
    <nav>
        <a href="/produtos/novo" class="btn btn-primary">+ Novo produto</a>
        <span th:if="${blingConectado}" class="pill pill-ok">Bling conectado</span>
        <a th:unless="${blingConectado}" href="/bling/conectar" class="btn">Conectar Bling</a>
    </nav>
</header>
</body>
</html>
